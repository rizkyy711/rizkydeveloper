name: Auto Unzip to Root and Push

on:
  push:
    paths:
      - '**.zip'
      - '**.ZIP'

jobs:
  unzip-and-push:
    # Mencegah bot memicu workflow-nya sendiri (anti-infinite loop)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Unzip file to root
      run: |
        # Ekstrak semua file zip langsung ke root
        find . -maxdepth 1 -iname "*.zip" -exec unzip -o {} -d . \;
        
        # Hapus file ZIP asli agar tidak memicu duplikasi atau mengotori repo
        find . -maxdepth 1 -iname "*.zip" -delete

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add .
        
        if [ -n "$(git status --porcelain)" ]; then
          # Tambahkan [skip ci] di commit message agar GitHub tahu ini push dari bot dan tidak perlu dicek lagi
          git commit -m "Automated unzip to root [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
        else
          echo "Tidak ada perubahan baru."
        fi
